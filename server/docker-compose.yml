services:
  api:
    build: .
    container_name: veganland-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgres://veganland:${POSTGRES_PASSWORD}@postgres:5432/veganland
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: veganland-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: veganland
      POSTGRES_USER: veganland
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - veganland-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veganland -d veganland"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  veganland-postgres-data:
